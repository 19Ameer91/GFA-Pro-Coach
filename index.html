<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFA Pro - الملعب الحي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --pitch-green: #022c0b; }
        body { background: #010409; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        /* الملعب التكتيكي الذهبي */
        .pitch {
            width: 100%; max-width: 950px; height: 450px;
            background: var(--pitch-green); margin: 20px auto;
            border: 4px solid var(--gold); border-radius: 20px;
            position: relative; overflow: hidden;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }
        .pitch-line { position: absolute; border: 1px solid rgba(212, 175, 55, 0.3); }
        .center-circle { width: 120px; height: 120px; border: 2px solid var(--gold); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.3; }
        .half-line { width: 2px; height: 100%; background: rgba(212, 175, 55, 0.3); position: absolute; left: 50%; }

        /* نقاط اللاعبين (تظهر داخل الملعب) */
        .player-dot {
            position: absolute; width: 35px; height: 35px;
            background: var(--gold); color: black; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.9em; border: 2px solid white;
            box-shadow: 0 0 10px white; transition: all 0.5s ease;
            cursor: pointer; z-index: 10;
        }

        /* الرادار بالأسفل */
        .radar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-top: 30px; }
        .panel { background: #0d1117; padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        input, select { padding: 12px; margin: 5px; background: #161b22; border: 1px solid #30363d; color: white; border-radius: 8px; }
        button { cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

    <h2 style="color: var(--gold); text-shadow: 0 0 10px var(--gold);">🛰️ رادار المستعمرة - الملعب الذهبي المباشر</h2>

    <div class="pitch" id="live-pitch">
        <div class="half-line"></div>
        <div class="center-circle"></div>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.05; font-size: 8em; font-weight: bold;">GFA</div>
        </div>

    <div class="panel">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
            <input type="text" id="p-name" placeholder="اسم المحترف">
            <input type="number" id="p-kit" placeholder="رقم القميص">
            <select id="p-pos">
                <option value="GK">حارس مرمى</option>
                <option value="DEF">مدافع</option>
                <option value="MID">لاعب وسط</option>
                <option value="FWD">مهاجم</option>
            </select>
            <button onclick="register()" style="background: var(--gold); border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; color: black;">إرسال للميدان ✅</button>
        </div>
    </div>

    <div id="players-match-list" class="radar-grid"></div>

    <script src="script.js"></script>
</body>
</html>
