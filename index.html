<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFA Pro Coach - لوحة القائد أمير</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body { background: var(--black); color: white; font-family: Arial, sans-serif; text-align: center; }
        .card { border: 2px solid var(--gold); padding: 20px; margin: 20px; border-radius: 15px; }
        input, select, button { padding: 12px; margin: 10px; width: 80%; border-radius: 5px; }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid var(--gold); padding: 10px; }
        .btn-delete { background: #ff4444; color: white; padding: 5px; width: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="verification-section" style="border: 1px dashed var(--gold); padding: 10px; margin-top: 10px; border-radius: 10px;">
    <h4 style="color: var(--gold); margin-bottom: 5px;">التحقق من الهوية الرقمية 🛡️</h4>
    
    <select id="verifyMethod" style="width: 90%; background: #333;">
        <option value="WHATSAPP">استلام الكود عبر (WhatsApp) ✅</option>
        <option value="SMS">استلام الكود عبر (رسالة نصية SMS) 📱</option>
    </select>

    <button id="sendCodeBtn" onclick="sendOTP()" style="width: 90%; background: #28a745; color: white;">طلب كود التفعيل 📲</button>

    <div id="otp-input-area" class="hidden" style="margin-top: 10px;">
        <input type="text" id="otpCode" placeholder="أدخل الكود المكون من 6 أرقام" style="text-align: center; letter-spacing: 5px;">
        <button onclick="verifyAndAdd()" style="width: 90%; background: var(--gold); color: black;">تأكيد وإضافة للفريق ✅</button>
    </div>
</div>
    <script>
        const firebaseURL = "https://procoach-40d9f-default-rtdb.firebaseio.com/registrations.json";

        async function activateAccount() {
            const name = document.getElementById('fullName').value;
            const phone = document.getElementById('mobile').value;
            const role = document.getElementById('role').value;

            if(!name || !phone) { alert("أدخل بياناتك يا قائد!"); return; }

            const userData = { fullName: name, mobile: phone, role: role, time: new Date() };

            await fetch(firebaseURL, { method: 'POST', body: JSON.stringify(userData) });
            
            if (role === "ADMIN") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadData();
            } else {
                alert("تم إرسال بياناتك بنجاح!");
            }
        }

        async function loadData() {
            const response = await fetch(firebaseURL);
            const data = await response.json();
            const tableBody = document.getElementById('admin-table-body');
            tableBody.innerHTML = "";

            for (let id in data) {
                const user = data[id];
                tableBody.innerHTML += `
                    <tr>
                        <td>${user.fullName}</td>
                        <td>${user.role}</td>
                        <td>${user.mobile}</td>
                        <td><button class="btn-delete" onclick="deleteUser('${id}')">حذف 🗑️</button></td>
                    </tr>
                `;
            }
        }

        async function deleteUser(id) {
            if(confirm("هل تريد حذف هذا الشخص؟")) {
                await fetch(`https://procoach-40d9f-default-rtdb.firebaseio.com/registrations/${id}.json`, { method: 'DELETE' });
                loadData();
            }
        }
    </script>
</body>
</html>
