<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFA Pro - الملعب الذهبي التكتيكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --gold: #d4af37; 
            --pitch-green: #022c0b; 
            --dark-bg: #010409; 
            --panel-bg: #0d1117;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--dark-bg); 
            color: white; 
            direction: rtl; 
            margin: 0; 
            padding: 20px; 
        }

        .container { max-width: 1100px; margin: auto; }

        /* --- تصميم الملعب الذهبي التكتيكي --- */
        .pitch-container {
            width: 100%;
            background: var(--pitch-green);
            height: 400px;
            border: 4px solid var(--gold);
            border-radius: 20px;
            margin-bottom: 30px;
            position: relative;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
            overflow: hidden;
        }

        .pitch-line { position: absolute; border: 2px solid rgba(212, 175, 55, 0.4); }
        .center-line { height: 100%; width: 1px; left: 50%; top: 0; }
        .center-circle { 
            width: 100px; height: 100px; border-radius: 50%; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
        }
        .penalty-area-left { width: 150px; height: 250px; left: 0; top: 50%; transform: translateY(-50%); border-left: none; }
        .penalty-area-right { width: 150px; height: 250px; right: 0; top: 50%; transform: translateY(-50%); border-right: none; }
        
        .pitch-title {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 5em; font-weight: bold; color: rgba(212, 175, 55, 0.1);
            pointer-events: none; letter-spacing: 20px;
        }

        /* --- لوحات التحكم والرادار --- */
        .panel { background: var(--panel-bg); padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select { padding: 12px; background: #161b22; border: 1px solid #30363d; color: white; border-radius: 8px; outline: none; }
        
        .main-btn { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .main-btn:hover { background: #fdbb2d; transform: scale(1.01); }

        #players-match-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .player-card { padding: 20px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2); text-align: center; transition: 0.4s; }

        /* --- منصة التتويج --- */
        .leaderboard { background: linear-gradient(135deg, #0f172a, #1e293b); padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 20px; display: flex; justify-content: space-around; gap: 10px; }
        .top-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; flex: 1; text-align: center; border-bottom: 3px solid var(--gold); }

        .var-room { background: #020617; padding: 15px; border-radius: 12px; border-right: 4px solid #fbbf24; max-height: 150px; overflow-y: auto; margin-top: 20px; font-family: monospace; }
        
        #ticker { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--gold); color: black; padding: 8px 0; font-weight: bold; overflow: hidden; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: move 25s linear infinite; padding-left: 100%; }
        @keyframes move { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--gold); margin-bottom: 5px;">🛰️ GFA PRO MAX - مركز القيادة</h2>
    <div id="digital-clock" style="text-align: center; font-size: 1.5em; margin-bottom: 20px; color: var(--gold);">00:00:00</div>

    <div class="pitch-container">
        <div class="pitch-title">GFA</div>
        <div class="pitch-line center-line"></div>
        <div class="pitch-line center-circle"></div>
        <div class="pitch-line penalty-area-left"></div>
        <div class="pitch-line penalty-area-right"></div>
    </div>

    <div id="top-players" class="leaderboard">
        <p style="opacity: 0.5;">في انتظار تسجيل الأداء...</p>
    </div>

    <div class="panel">
        <div class="input-grid">
            <input type="text" id="p-name" placeholder="اسم المحترف">
            <input type="text" id="p-id" placeholder="الرقم المدني">
            <input type="number" id="p-kit" placeholder="الرقم">
            <select id="p-pos">
                <option value="GK">حارس مرمى</option>
                <option value="DEF">مدافع</option>
                <option value="MID">وسط</option>
                <option value="FWD">مهاجم</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="color" id="c1" value="#d4af37">
            <input type="color" id="c2" value="#1a2a6c">
            <button onclick="clearAll()" style="background: #ef4444; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">تصفير شامل 🗑️</button>
        </div>
        <button class="main-btn" onclick="register()">تثبيت وتدشين في الميدان ✅</button>
    </div>

    <div class="panel" style="border-top: 4px solid #ef4444;">
        <h3 style="color: #f87171; margin-top: 0;">🛰️ الرادار الميداني المباشر</h3>
        <div id="players-match-list"></div>
    </div>

    <div class="var-room" id="var-logs">
        <div style="color: #fbbf24; margin-bottom: 5px;">🎥 سجل الـ VAR المباشر:</div>
    </div>
</div>

<div id="ticker"><div class="ticker-move" id="ticker-content">📡 نظام GFA PRO نشط...</div></div>

<script>
    // --- محرك التشغيل ---
    setInterval(() => {
        document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('ar-SA');
    }, 1000);

    function register() {
        const name = document.getElementById('p-name').value;
        const id = document.getElementById('p-id').value;
        const kit = document.getElementById('p-kit').value;
        if(!name || !id || !kit) return alert("أكمل البيانات!");

        const player = {
            uid: id + Math.random(),
            name, kit,
            pos: document.getElementById('p-pos').value,
            c1: document.getElementById('c1').value,
            c2: document.getElementById('c2').value,
            points: 50, rating: "50%",
            isOut: false, isSub: false
        };

        let db = JSON.parse(localStorage.getItem('gfa_db')) || [];
        db.push(player);
        localStorage.setItem('gfa_db', JSON.stringify(db));
        render();
        alert("✅ تم التثبيت!");
    }

    function render() {
        const list = document.getElementById('players-match-list');
        let db = JSON.parse(localStorage.getItem('gfa_db')) || [];
        list.innerHTML = '';

        db.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'player-card';
            if(p.isOut) card.style.background = "#1a1a1a";
            else if(p.isSub) card.style.background = "#0f172a";
            else card.style.background = `linear-gradient(135deg, ${p.c1}, ${p.c2})`;
            
            if(p.points >= 100 && !p.isOut) card.style.boxShadow = "0 0 20px var(--gold)";

            card.innerHTML = `
                <div style="font-size: 1.5em; font-weight: bold;">${p.isOut?'⛔':p.isSub?'🔄':'#'+p.kit}</div>
                <div style="font-weight: bold;">${p.name}</div>
                <div style="background: white; color: black; padding: 5px; border-radius: 5px; margin: 10px 0; font-weight: bold;">
                    ${p.isOut?'مطرود 🟥':p.isSub?'مستبدل 🔄':p.rating}
                </div>
                ${(!p.isOut && !p.isSub) ? `
                    <select onchange="action(${index}, this)" style="width: 100%; margin-bottom: 5px;">
                        <option value="">➕ تسجيل فعل...</option>
                        <option value="15">صد ضربة جزاء (+15)</option>
                        <option value="10">هدف (+10)</option>
                        <option value="RED">طرد مباشر 🟥</option>
                    </select>
                    <button onclick="sub(${index})" style="width: 100%; background: #3b82f6; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-weight: bold;">🔄 تبديل لاعب</button>
                ` : ''}
            `;
            list.appendChild(card);
        });
        updateBoard();
    }

    function action(idx, select) {
        let db = JSON.parse(localStorage.getItem('gfa_db')) || [];
        let p = db[idx];
        if(select.value === "RED") {
            p.isOut = true;
            addLog(p.name, "طرد مباشر 🟥", -20);
        } else {
            const pts = parseInt(select.value);
            p.points += pts;
            p.rating = Math.max(p.points, 0) + "%";
            addLog(p.name, select.options[select.selectedIndex].text, pts);
        }
        localStorage.setItem('gfa_db', JSON.stringify(db));
        render();
    }

    function sub(idx) {
        if(!confirm("تأكيد التبديل؟")) return;
        let db = JSON.parse(localStorage.getItem('gfa_db')) || [];
        db[idx].isSub = true;
        addLog(db[idx].name, "خروج (تبديل) 🔄", 0);
        localStorage.setItem('gfa_db', JSON.stringify(db));
        render();
    }

    function addLog(name, act, pts) {
        const log = document.getElementById('var-logs');
        const d = document.createElement('div');
        d.innerHTML = `[${new Date().toLocaleTimeString('ar-SA')}] ${name}: ${act} (${pts}%)`;
        log.prepend(d);
    }

    function updateBoard() {
        let db = JSON.parse(localStorage.getItem('gfa_db')) || [];
        const board = document.getElementById('top-players');
        const ticker = document.getElementById('ticker-content');
        let sorted = [...db].filter(x => !x.isOut).sort((a,b) => b.points - a.points).slice(0, 3);
        
        if(sorted.length > 0) {
            board.innerHTML = sorted.map((p, i) => `
                <div class="top-card">
                    <div>${i==0?'🏆':i==1?'🥈':'🥉'}</div>
                    <div style="font-weight: bold; font-size: 0.8em;">${p.name} ${p.isSub?'(🔄)':''}</div>
                    <div style="color: var(--gold);">${p.rating}</div>
                </div>
            `).join('');
            ticker.innerText = db.map(p => ` 🌟 [${p.name}] ${p.rating} `).join(" --- ");
        }
    }

    function clearAll() { if(confirm("تصفير شامل؟")) { localStorage.clear(); location.reload(); } }
    window.onload = render;
</script>

</body>
</html>
