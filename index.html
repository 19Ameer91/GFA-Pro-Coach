<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFA Sovereign - التدشين العالمي 🛡️</title>
    <style>
        :root { --gold: #d4af37; --pitch-green: #2ecc71; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 📱 شاشة بوابة السيادة الفخمة */
        #gate-screen { 
            position: fixed; inset: 0; 
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'), radial-gradient(circle, #1a3c1a 0%, #050505 100%);
            z-index: 1000; display: flex; align-items: center; justify-content: center; 
        }
        .gate-box { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); 
            border: 1px solid rgba(212, 175, 55, 0.3); width: 90%; max-width: 400px; 
            padding: 30px; border-radius: 25px; text-align: center;
            box-shadow: 0 0 30px rgba(212,175,55,0.1);
        }
        
        .pro-input {
            width: 100%; background: rgba(255,255,255,0.9); border: none;
            padding: 12px; border-radius: 8px; box-sizing: border-box;
            color: #333; font-weight: bold; margin-bottom: 10px;
        }

        .btn-gold-pro {
            width: 100%; background: linear-gradient(45deg, #d4af37, #f2d06b);
            color: #000; border: none; padding: 15px; margin-top: 10px;
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-gold-pro:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6); }

        /* الشاشة الرئيسية (تظهر بعد التسجيل) */
        #main-app { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="gate-screen">
    <div class="gate-box">
        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="color: #d4af37; font-size: 2.5em; margin: 0; letter-spacing: 2px;">GFA</h1>
            <p style="color: #fff; letter-spacing: 4px; font-size: 0.8em; margin-top: -5px;">SOVEREIGN</p>
        </div>

        <div class="input-group" style="text-align: right;">
            <label style="color: #aaa; font-size: 0.8em;">الاسم الثلاثي</label>
            <input type="text" id="full-name" class="pro-input" placeholder="👤">
            
            <label style="color: #aaa; font-size: 0.8em;">رقم الوثيقة الوطنية</label>
            <input type="text" id="national-id" class="pro-input" placeholder="🆔">
            
            <label style="color: #aaa; font-size: 0.8em;">رقم الهاتف النقال</label>
            <input type="tel" id="user-phone" class="pro-input" placeholder="📞">

            <label style="color: #aaa; font-size: 0.8em;">اختر صفتك الرسمية</label>
          <select id="user-position" class="gfa-input">
    <option value="">-- حدد نوع الحساب --</option>
    <option value="REF">حكم ساحة / مساعد</option>
    <option value="ADMIN">لجنة تحكيم / مراقب</option>
    <option value="COACH">مدرب فريق</option>
    <option value="PLAYER">لاعب كرة قدم</option>
</select>
        </div>

        <button class="btn-gold-pro" onclick="requestActivation()">تنشيط الحساب ⚡</button>
    </div>
</div>

<div id="main-app">
    <h2 style="color: var(--gold);">تم تفعيل النظام بنجاح يا قائد.. الميدان تحت سيطرتك!</h2>
</div>

<script>
    // 📡 محرك السحابة العالمي
    const firebaseURL = "https://gfa-sovereign-default-rtdb.firebaseio.com/registrations.json";

    async function requestActivation() {
        // جلب البيانات
        const name = document.getElementById('full-name').value;
        const id = document.getElementById('national-id').value;
        const phone = document.getElementById('user-phone').value;
        const role = document.getElementById('user-role').value;

        // فحص الأمان
        if(!name || !phone || !role) {
            alert("⚠️ يا قائد، املأ البيانات الأساسية أولاً!");
            return;
        }

        const playerData = {
            fullName: name,
            nationalID: id,
            mobile: phone,
            role: role,
            timestamp: new Date().toLocaleString()
        };

        try {
            // إرسال للسحابة
            const response = await fetch(firebaseURL, {
                method: 'POST',
                body: JSON.stringify(playerData)
            });

            if(response.ok) {
                alert("🚀 تم استلام بياناتك بنجاح! جاري تنشيط رتبتك...");
                document.getElementById('gate-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
            } else {
                alert("❌ خطأ في السيرفر العالمي");
            }
        } catch (error) {
            alert("⚠️ فشل الاتصال.. تأكد من الإنترنت!");
        }
    }
</script>

</body>
</html>
